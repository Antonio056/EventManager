{% extends "base.html" %}
{% set title = "GestionEventi | Registrazione" %}
{% block content %}
<section class="auth-page">
  <form class="auth-card" method="post">
    <p class="eyebrow">Nuovo cliente</p>
    <h1>Registrati</h1>
    <label>Nome<input name="nome" required></label>
    <label>Cognome<input name="cognome" required></label>
    <label>Email<input type="email" name="email" required></label>
    <label>Telefono<input name="telefono"></label>
    <label>Password<input type="password" name="password" required minlength="6"></label>
    <label>Conferma password<input type="password" name="conferma_password" required minlength="6"></label>
    <button class="btn primary" type="submit">Crea account</button>
    <p class="helper">Hai già un account? <a href="{{ url_for('login') }}">Accedi</a></p>
  </form>
</section>
{% endblock %}
