{% extends "base.html" %}
{% set title = "GestionEventi | Modifica password" %}
{% block content %}
<section class="auth-page">
  <form class="auth-card" method="post">
    <p class="eyebrow">Sicurezza account</p>
    <h1>Modifica password</h1>
    <label>Password attuale<input type="password" name="vecchia_password" required></label>
    <label>Nuova password<input type="password" name="nuova_password" required minlength="6"></label>
    <label>Conferma nuova password<input type="password" name="conferma_password" required minlength="6"></label>
    <button class="btn primary" type="submit">Aggiorna password</button>
  </form>
</section>
{% endblock %}
